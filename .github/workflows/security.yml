name: security

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'
      - run: pip install semgrep==1.170.0
      - name: Resolve diff baseline
        id: baseline
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            ref="$PR_BASE_SHA"
          elif [ "$EVENT_NAME" = "push" ] && [ "$PUSH_BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
            ref="$PUSH_BEFORE_SHA"
          else
            ref=""
          fi
          if [ -n "$ref" ] && ! git cat-file -e "${ref}^{commit}" 2>/dev/null; then
            ref=""
          fi
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
      - name: Semgrep scan (p/default, diff-aware)
        env:
          BASELINE_REF: ${{ steps.baseline.outputs.ref }}
        run: |
          if [ -n "$BASELINE_REF" ]; then
            semgrep scan --config p/default --error --metrics=off --baseline-commit "$BASELINE_REF" .
          else
            semgrep scan --config p/default --error --metrics=off .
          fi

  sca:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - name: Install osv-scanner
        run: |
          curl -sSfLo osv-scanner https://github.com/google/osv-scanner/releases/download/v2.4.0/osv-scanner_linux_amd64
          chmod +x osv-scanner
      - name: OSV dependency scan
        run: ./osv-scanner scan source --recursive --allow-no-lockfiles .
