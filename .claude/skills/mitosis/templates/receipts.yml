name: receipts
on:
  pull_request:

jobs:
  receipts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          fetch-depth: 0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: 20
      - run: npm ci

      - uses: shaheershoaib/receipts/enforcer@c6127ba55f9a5669a95614639b08f5d49c3f228b

      - name: D6 cluster-boundary interaction tests
        run: node scripts/d6-check.cjs --base ${{ github.event.pull_request.base.sha }} --head ${{ github.event.pull_request.head.sha }}

  pr-title-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - name: Conventional Commits PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "$PR_TITLE" | grep -Eq '^(feat|fix|refactor|docs|test|chore|perf|ci)(\([a-z0-9-]+\))?!?: .+' \
            || { echo "PR title must be Conventional Commits (the per-MSP squash message)"; exit 1; }
